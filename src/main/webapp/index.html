<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rural Service Finder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">🌿 Rural Service Finder</div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search services like plumber, electrician...">
        <button>Search</button>
    </div>

    <!-- Services -->
    <div class="services">
        <h2>Popular Services</h2>

        <div class="service-grid">
            <div class="service-card">🔧 Plumber</div>
            <div class="service-card">💡 Electrician</div>
            <div class="service-card">🚜 Farmer Help</div>
            <div class="service-card">🧹 Cleaner</div>
        </div>
    </div>

    <!-- Providers -->
    <div class="providers">
        <h2>Nearby Providers</h2>

        <div class="provider-card">
            <img src="https://via.placeholder.com/60">
            <div class="provider-info">
                <h3>Ramesh Plumber</h3>
                <p>Raipur • ⭐ 4.5</p>
            </div>
        </div>

        <div class="provider-card">
            <img src="https://via.placeholder.com/60">
            <div class="provider-info">
                <h3>Suresh Electrician</h3>
                <p>Bhilai • ⭐ 4.2</p>
            </div>
        </div>

    </div>

</div>

<!-- Bottom Nav -->
<div class="navbar">
    <a href="#" class="active">Home</a>
    <a href="#">Services</a>
    <a href="#">Profile</a>
</div>

</body>
</html>
